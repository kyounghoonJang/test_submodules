# File: deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  namespace: my-app # <-- Submodule의 namespace.yaml을 참조합니다.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.0 # 나중에 이 버전을 바꿔서 프로모션 할 겁니다.
        ports:
        - containerPort: 80
